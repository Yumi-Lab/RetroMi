on:
  schedule:
    - cron: '0 8 * * 1'   # Chaque lundi 8h UTC
  workflow_dispatch:

name: Update upstream dependencies

jobs:
  check-sdldb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SDL_GameControllerDB latest commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/gabomdq/SDL_GameControllerDB/commits/master --jq '.sha')
          CURRENT=$(cat src/modules/retroarch/SDLDB_VERSION | tr -d '[:space:]')

          echo "Current: ${CURRENT:0:7}"
          echo "Latest:  ${LATEST:0:7}"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "SDL_GameControllerDB is up to date."
            exit 0
          fi

          echo "$LATEST" > src/modules/retroarch/SDLDB_VERSION

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/bump-sdldb-${LATEST:0:7}"
          git checkout -b "$BRANCH"
          git add src/modules/retroarch/SDLDB_VERSION
          git commit -m "chore(retroarch): bump SDL_GameControllerDB ${CURRENT:0:7} → ${LATEST:0:7}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(retroarch): bump SDL_GameControllerDB ${CURRENT:0:7} → ${LATEST:0:7}" \
            --body "Upstream SDL_GameControllerDB updated.

New commit: [\`${LATEST:0:7}\`](https://github.com/gabomdq/SDL_GameControllerDB/commit/${LATEST})

Changes: https://github.com/gabomdq/SDL_GameControllerDB/compare/${CURRENT}...${LATEST}

> Auto-generated by update-deps workflow." \
            --base develop \
            --head "$BRANCH"
# RetroArch config — SmartPi One (AllWinner H3 / Mali-400)
# Optimized for OpenGL ES 2.0 + armhf performance

# Video — Mali-400 OpenGL ES 2.0
video_driver = "gl"
video_context_driver = "egl_plain"
video_threaded = "true"
video_smooth = "false"
video_vsync = "true"
video_fullscreen = "true"
video_aspect_ratio_auto = "true"
video_scale_integer = "false"

# Performance — H3 Cortex-A7 (no rewind, no runahead)
rewind_enable = "false"
run_ahead_enabled = "false"
savestate_auto_save = "false"
savestate_auto_load = "false"

# Audio — ALSA
audio_driver = "alsa"
audio_latency = "64"

# Input
input_joypad_driver = "udev"
input_player1_joypad_index = "0"

# Hotkeys (hold SELECT + button)
input_enable_hotkey_btn = "8"
input_exit_emulator_btn = "7"
input_save_state_btn = "5"
input_load_state_btn = "4"
input_menu_toggle_btn = "2"
input_screenshot_btn = "9"

# UI
menu_driver = "xmb"
menu_unified_controls = "true"
pause_nonactive = "false"
menu_show_online_updater = "false"
menu_show_core_updater = "false"

# Paths
savefile_directory = "/home/pi/RetroPie/saves"
savestate_directory = "/home/pi/RetroPie/savestates"
screenshot_directory = "/home/pi/RetroPie/screenshots"
